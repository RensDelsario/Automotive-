<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Automotive Website</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background-color: #f4f4f4; 
        }
        h1 { 
            text-align: center;
            color: #333; 
        }
        p { 
            text-align: center; 
            color: #666; 
        }
        form { 
            max-width: 400px; 
            margin: 0 auto; 
        }
        label { 
            display: block; 
            margin-top: 10px; }
        input, textarea { 
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
        }
        button { 
            margin-top: 10px; 
            padding: 10px 20px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
        }
        button:hover { 
            background-color: #0056b3; 
        }
        a { 
            color: #007bff; 
            text-decoration: none; 
        }
        a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <p>Get in touch with us for any inquiries or to schedule a service.</p>
    <form action="#">
        <label for="name">Name:</label>
        <input type="text"  name="name" required>
        
        <label for="email">Email:</label>
        <input type="email"  name="email" required>
        
        <label for="message">Message:</label>
        <textarea name="message" rows="5" required></textarea>
        
        <button type="submit">Send Message</button>
    </form>

    <a href="index.html">Back to Home</a>
</body>
</html>
